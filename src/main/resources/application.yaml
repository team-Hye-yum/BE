spring:
  application:
    name: hyeyum
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hyeyum}
    username: ${SPRING_DATASOURCE_USERNAME:hyeyum}
    password: ${SPRING_DATASOURCE_PASSWORD:hyeyum}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  servlet:
    context-path: /api

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4.1-mini}
  connect-timeout-seconds: ${OPENAI_CONNECT_TIMEOUT_SECONDS:30}
  write-timeout-seconds: ${OPENAI_WRITE_TIMEOUT_SECONDS:60}
  read-timeout-seconds: ${OPENAI_READ_TIMEOUT_SECONDS:180}
  call-timeout-seconds: ${OPENAI_CALL_TIMEOUT_SECONDS:240}
