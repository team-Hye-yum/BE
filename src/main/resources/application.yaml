spring:
  application:
    name: hyeyum
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hyeyum}
    username: ${SPRING_DATASOURCE_USERNAME:hyeyum}
    password: ${SPRING_DATASOURCE_PASSWORD:hyeyum}
    driver-class-name: org.postgresql.Driver
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
  data:
    elasticsearch:
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4.1-mini}
  connect-timeout-seconds: ${OPENAI_CONNECT_TIMEOUT_SECONDS:30}
  write-timeout-seconds: ${OPENAI_WRITE_TIMEOUT_SECONDS:60}
  read-timeout-seconds: ${OPENAI_READ_TIMEOUT_SECONDS:180}
  call-timeout-seconds: ${OPENAI_CALL_TIMEOUT_SECONDS:240}
  company-metrics:
    prompt-directory: ${OPENAI_COMPANY_METRICS_PROMPT_DIRECTORY:}
    parallelism: ${OPENAI_COMPANY_METRICS_PARALLELISM:5}

support-program-search:
  elasticsearch:
    enabled: ${SUPPORT_PROGRAM_SEARCH_ELASTICSEARCH_ENABLED:true}
    startup-sync-enabled: ${SUPPORT_PROGRAM_SEARCH_STARTUP_SYNC_ENABLED:true}
    startup-sync-initial-delay-seconds: ${SUPPORT_PROGRAM_SEARCH_STARTUP_SYNC_INITIAL_DELAY_SECONDS:10}
    startup-sync-max-attempts: ${SUPPORT_PROGRAM_SEARCH_STARTUP_SYNC_MAX_ATTEMPTS:12}
    startup-sync-retry-delay-seconds: ${SUPPORT_PROGRAM_SEARCH_STARTUP_SYNC_RETRY_DELAY_SECONDS:5}
    result-size: ${SUPPORT_PROGRAM_SEARCH_RESULT_SIZE:100}
